<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>VESTA CLOUD | Control Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Sol Navigasyon -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo">V</div>
                <span>VESTA</span>
            </div>
            
            <nav class="side-menu">
                <div class="menu-item active" onclick="navigate('home', this)"><i class="ri-dashboard-fill"></i><span>Panel</span></div>
                <div class="menu-item" onclick="navigate('domain', this)"><i class="ri-global-fill"></i><span>Domain</span></div>
                <div class="menu-item" onclick="navigate('shop', this)"><i class="ri-shopping-bag-3-fill"></i><span>Mağaza</span></div>
                <div class="menu-item" onclick="navigate('cart', this)"><i class="ri-shopping-cart-2-fill"></i><span id="cart-lbl">Sepet</span></div>
            </nav>

            <div class="user-card">
                <div class="avatar">H</div>
                <div class="u-meta"><b>Haitee</b><small>Developer</small></div>
            </div>
        </aside>

        <!-- Ana Görünüm -->
        <main class="main-content">
            <header class="view-header">
                <h1 id="active-title">Yönetim Paneli</h1>
                <div class="status-indicator">Sistem: <span>Aktif</span></div>
            </header>

            <div id="page-wrapper">
                <!-- Sayfalar buraya asenkron basılır -->
            </div>
        </main>
    </div>

    <!-- Yapılandırma Modalı (image_b5727f.png referanslı simetri düzeltmesi) -->
    <div id="configOverlay" class="glass-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2>Donanım Yapılandır</h2>
                <p>Ek kaynaklar otomatik olarak fiyata yansır.</p>
            </div>
            <div class="modal-body">
                <div class="input-field">
                    <label>Ekstra RAM (GB)</label>
                    <input type="number" id="m-ram" value="0" min="0" oninput="recalc()">
                </div>
                <div class="input-field">
                    <label>Ekstra CPU (Core)</label>
                    <input type="number" id="m-cpu" value="0" min="0" oninput="recalc()">
                </div>
            </div>
            <div class="modal-footer">
                <div class="price-tag">Toplam: <span id="m-price">150</span> TL</div>
                <div class="btn-group">
                    <button class="btn btn-sec" onclick="closeM()">İPTAL</button>
                    <button class="btn btn-pri" onclick="addToCart()">SEPETE EKLE</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
